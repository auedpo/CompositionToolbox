<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Notation</title>
  <script src="vexflow-min.js"></script>
  <style>
    body{ margin:0; background:#F5F0E6; color:#111; font-family:Segoe UI; overflow:hidden; }
    #score { padding:8px; overflow:hidden; }
  </style>
</head>
<body>
  <div id="score"></div>

  <script>
    if (!window.Vex || !Vex.Flow) {
      const score = document.getElementById('score');
      score.textContent = 'VexFlow failed to load.';
      throw new Error('VexFlow failed to load.');
    }
    const VF = Vex.Flow;

    function midiToNoteSpec(midi, preferSharps) {
      const sharpNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
      const flatNames = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];
      const names = preferSharps ? sharpNames : flatNames;
      const octave = Math.floor(midi / 12) - 1;
      const note = names[midi % 12];
      const base = note[0].toLowerCase();
      const acc = note.length > 1 ? note.slice(1) : null;
      return { key: base + "/" + octave, acc };
    }

    const edo19Names = ['C', 'C#', 'Db', 'D', 'D#', 'Eb', 'E', 'E#', 'F', 'F#', 'Gb', 'G', 'G#', 'Ab', 'A', 'A#', 'Bb', 'B', 'B#'];

    function pcToEdo19Spec(pc, baseOctave) {
      const normalized = ((pc % 19) + 19) % 19;
      const name = edo19Names[normalized];
      const base = name[0].toLowerCase();
      const acc = name.length > 1 ? name.slice(1) : null;
      return { key: base + "/" + baseOctave, acc };
    }

    function pcsToEdo19Notes(pcs, baseOctave) {
      return pcs.map(pc => pcToEdo19Spec(pc, baseOctave));
    }

    function pcsToEdoNotesWithMidi(pcs, midiList, modulus) {
      const safeMidi = midiList.length > 0 ? midiList : [60];
      const minMidi = Math.min(...safeMidi);
      const baseOctave = Math.floor(minMidi / 12) - 1;
      return pcs.map((pc, i) => {
        const midi = midiList[i] ?? minMidi;
        const octaveShift = Math.floor((midi - minMidi) / modulus);
        const octave = baseOctave + octaveShift;
        return pcToEdo19Spec(pc, octave);
      });
    }

    function getDirectionPreference(values, i, fallback) {
      if (i > 0 && values[i] !== values[i - 1]) return values[i] > values[i - 1];
      for (let j = i + 1; j < values.length; j++) {
        if (values[j] !== values[i]) return values[j] > values[i];
      }
      return fallback !== undefined ? fallback : true;
    }

    function pcsToMidiNotes(pcs, base=60, rule='noteaware') {
      const mode = (rule || 'noteaware').toLowerCase();
      let lastPreference = true;
      let prevAccidental = null;
      return pcs.map((pc, i) => {
        let preferSharps = true;
        if (mode === 'allsharps') {
          preferSharps = true;
        } else if (mode === 'allflats') {
          preferSharps = false;
        } else {
          preferSharps = getDirectionPreference(pcs, i, lastPreference);
          if (mode === 'noteaware') {
            if (prevAccidental === '#') preferSharps = true;
            if (prevAccidental === 'b') preferSharps = false;
          }
        }

        const spec = midiToNoteSpec(base + pc, preferSharps);
        lastPreference = preferSharps;
        prevAccidental = spec.acc ? spec.acc : null;
        return spec;
      });
    }

    function midiListToNoteSpecs(midiList, rule='noteaware') {
      const mode = (rule || 'noteaware').toLowerCase();
      let lastPreference = true;
      let prevAccidental = null;
      return midiList.map((midi, i) => {
        let preferSharps = true;
        if (mode === 'allsharps') {
          preferSharps = true;
        } else if (mode === 'allflats') {
          preferSharps = false;
        } else {
          preferSharps = getDirectionPreference(midiList, i, lastPreference);
          if (mode === 'noteaware') {
            if (prevAccidental === '#') preferSharps = true;
            if (prevAccidental === 'b') preferSharps = false;
          }
        }

        const spec = midiToNoteSpec(midi, preferSharps);
        lastPreference = preferSharps;
        prevAccidental = spec.acc ? spec.acc : null;
        return spec;
      });
    }

    window.renderPcs = function(payload) {
      try {
        const obj = payload;
        const mode = obj.mode;
        const pcs = obj.pcs || [];
        const midiList = Array.isArray(obj.midi) ? obj.midi : null;
        const label = obj.label || '';
        const base = 60; // C4
        const accidentalRule = obj.accidentalRule || 'noteaware';
        const viewportWidth = obj.width || 700;
        const viewportHeight = obj.height || 160;
        const contentWidth = obj.contentWidth || viewportWidth;
        const maxNotes = obj.maxNotes || null;
        const clip = obj.clip === true;
        const showOverflow = obj.showOverflow === true;
        const allowScroll = obj.allowScroll === true;

        const score = document.getElementById('score');
        score.innerHTML = '';
        score.style.width = contentWidth + 'px';
        score.style.height = viewportHeight + 'px';
        score.style.overflow = clip ? 'hidden' : (allowScroll ? 'auto' : 'visible');
        document.body.style.overflow = clip ? 'hidden' : (allowScroll ? 'auto' : 'visible');

        const renderer = new VF.Renderer(score, VF.Renderer.Backends.SVG);
        renderer.resize(contentWidth, viewportHeight);
        const context = renderer.getContext();
        context.setFillStyle('#111');
        context.setStrokeStyle('#111');
        const staveWidth = Math.max(60, contentWidth - 20);
        const stave = new VF.Stave(10, 10, staveWidth);
        stave.addClef('treble').setContext(context).draw();

        const overflowCount = maxNotes && pcs.length > maxNotes ? pcs.length - maxNotes : 0;
        const renderPcs = maxNotes ? pcs.slice(0, maxNotes) : pcs;
        const renderMidi = midiList ? (maxNotes ? midiList.slice(0, maxNotes) : midiList) : null;
        const useEdo19 = obj.modulus === 19;
        const allowMidiForEdo19 = obj.useMidiForEdo19 === true;
        const noteSpecs = useEdo19 && renderPcs.length > 0
          ? (allowMidiForEdo19 && renderMidi && renderMidi.length === renderPcs.length
            ? pcsToEdoNotesWithMidi(renderPcs, renderMidi, obj.modulus)
            : pcsToEdo19Notes(renderPcs, 4))
          : (renderMidi ? midiListToNoteSpecs(renderMidi, accidentalRule) : pcsToMidiNotes(renderPcs, base, accidentalRule));
        if (noteSpecs.length === 0) {
          // render empty measure
          return;
        }

        let notes = [];
        const renderMode = (obj.renderMode || 'line').toLowerCase();
        if (renderMode === 'chord') {
          const chord = new VF.StaveNote({ clef: 'treble', keys: noteSpecs.map(n => n.key), duration: 'w' });
          noteSpecs.forEach((n, i) => {
            if (n.acc) {
              chord.addAccidental(i, new VF.Accidental(n.acc));
            }
          });
          notes = [chord];
        } else {
          notes = noteSpecs.map(n => {
            const note = new VF.StaveNote({ clef: 'treble', keys: [n.key], duration: 'q' });
            if (n.acc) {
              note.addAccidental(0, new VF.Accidental(n.acc));
            }
            return note;
          });
        }

        const voice = renderMode === 'chord'
          ? new VF.Voice({ num_beats: 4, beat_value: 4 })
          : new VF.Voice({ num_beats: notes.length, beat_value: 4 });
        voice.addTickables(notes);

        const formatter = new VF.Formatter();
        formatter.joinVoices([voice]).format([voice], Math.max(60, contentWidth - 40));
        voice.draw(context, stave);

        if (overflowCount > 0 && showOverflow) {
          const text = `+${overflowCount} more`;
          const x = Math.max(12, contentWidth - 80);
          context.save();
          context.setFont('Segoe UI', 10, '');
          context.fillText(text, x, 24);
          context.restore();
        }

      } catch (e) {
        console.error(e);
      }
    };
  </script>
</body>
</html>
